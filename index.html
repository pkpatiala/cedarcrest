<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cedar Crest Homes</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background-color: #e9e2d0;
}

/* ===== CAROUSEL ===== */
.carousel {
    width: 100%;
    height: 420px;
    overflow: hidden;
    background: black;
    position: relative;
}

.slides {
    display: flex;
    width: 300%;   /* 3 images */
    height: 100%;
    animation: slide 12s infinite;
}

.slide {
    width: 100%;
    flex-shrink: 0;
    display: flex;
    justify-content: center;
    align-items: center;
}

.slide img {
    max-width: 100%;
    max-height: 100%;
    object-fit: contain;
}

/* FIXED animation */
@keyframes slide {
    0%, 30% {transform: translateX(0);}
    33%, 63% {transform: translateX(-100%);}
    66%, 96% {transform: translateX(-200%);}
    100% {transform: translateX(0);}
}

/* ===== CONTENT ===== */
.content {
    text-align: center;
    padding: 70px 20px;
}

/* BIGGER LOGO */
.logo {
    width: 260px;   /* 👈 MUCH BIGGER */
    margin-bottom: 25px;
}

h1 {
    font-size: 44px;
    letter-spacing: 2px;
    margin-bottom: 10px;
}

h2 {
    font-weight: 300;
    color: #555;
    margin-bottom: 35px;
}

/* FORM */
.form-box {
    display: flex;
    justify-content: center;
    gap: 10px;
    flex-wrap: wrap;
}

input {
    padding: 12px;
    width: 260px;
    border-radius: 5px;
    border: 1px solid #ccc;
}

button {
    padding: 12px 18px;
    background: #c8a46b;
    border: none;
    color: white;
    border-radius: 5px;
    cursor: pointer;
}

.contact {
    margin-top: 25px;
    color: #444;
    font-size: 14px;
}
</style>

</head>

<body>

<!-- ===== CAROUSEL ===== -->
<div class="carousel">
    <div class="slides">

        <div class="slide">
            <img src="img1.jpg">
        </div>

        <div class="slide">
            <img src="img2.jpg">
        </div>

        <div class="slide">
            <img src="img3.jpg">
        </div>

    </div>
</div>

<!-- ===== CONTENT ===== -->
<div class="content">

    <img src="logo.png" class="logo">

    <h1>CEDAR CREST</h1>
    <h2>Luxury Homes Coming Soon in Mission, BC</h2>

    <div class="form-box">
        <input type="email" placeholder="Enter your email">
        <button>Register Interest</button>
    </div>

    <div class="contact">
        📞 604-614-7771<br>
        ✉️ info@pdcl.ca
    </div>

</div>

</body>
</html>
