<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cedar Crest Homes</title>

<style>
body {
    margin: 5;
    font-family: 'Segoe UI', sans-serif;
    background: #d8cfb8;
}

/* ===== CAROUSEL ===== */
.carousel {
    width: 100%;
    height: 450px;
    overflow: hidden;
    position: relative;
    background: #d8cfb8;
}

/* Slides */
.slides {
    position: relative;
    width: 100%;
    height: 100%;
}

.slide {
    position: absolute;
    width: 100%;
    height: 100%;
    opacity: 0;
    animation: fade 15s infinite;
}

.slide img {
    width: 100%;
    height: 100%;
    object-fit: contain;
}

/* Animation */
.slide:nth-child(1) { animation-delay: 0s; }
.slide:nth-child(2) { animation-delay: 5s; }
.slide:nth-child(3) { animation-delay: 10s; }

@keyframes fade {
    0% { opacity: 0; }
    5% { opacity: 1; }
    30% { opacity: 1; }
    35% { opacity: 0; }
    100% { opacity: 0; }
}

/* ===== CONTENT ===== */
.content {
    text-align: center;
    padding: 30px 20px 60px; /* 🔥 reduced top padding */
}

/* LOGO */
.logo {
    width: 1200px;
    margin-bottom: 10px; /* 🔥 reduced space below logo */
}

/* TEXT */
h1 {
    font-size: 42px;
    letter-spacing: 4px;
    margin: 5px 0; /* 🔥 tighter spacing */
}

h2 {
    font-weight: 300;
    color: #555;
    margin: 5px 0 20px; /* 🔥 tighter spacing */
}

/* FORM */
input {
    padding: 12px;
    width: 260px;
    border: none;
    border-radius: 5px;
}

button {
    padding: 12px 20px;
    border: none;
    background: #caa46b;
    color: white;
    border-radius: 5px;
    margin-left: 10px;
    cursor: pointer;
}

button:hover {
    background: #b8935c;
}

/* CONTACT */
.contact {
    margin-top: 15px; /* 🔥 reduced */
    color: #444;
}
</style>
</head>

<body>

<!-- ===== CAROUSEL ===== -->
<div class="carousel">
    <div class="slides">

        <div class="slide">
            <img src="img1.jpg">
        </div>

        <div class="slide">
            <img src="img2.jpg">
        </div>

        <div class="slide">
            <img src="img3.jpg">
        </div>

    </div>
</div>

<!-- ===== CONTENT ===== -->
<div class="content">

    <img src="logo.png" class="logo">

    <h1>CEDAR CREST</h1>

    <h2>Luxury Homes Coming Soon in Mission, BC</h2>

    <div>
        <input type="email" placeholder="Enter your email">
        <button>Register Interest</button>
    </div>

    <div class="contact">
        📞 604-614-7771<br>
        ✉️ info@pdcl.ca
    </div>

</div>

</body>
</html>
