<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cedar Crest Homes</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
}

/* HERO (ONLY IMAGE) */
.hero {
    position: relative;
    height: 50vh;
    overflow: hidden;
}

.slider {
    position: absolute;
    width: 100%;
    height: 100%;
}

.slide {
    position: absolute;
    width: 100%;
    height: 100%;
    object-fit: cover;
    opacity: 0;
    transition: opacity 1s ease-in-out;
}

.slide.active {
    opacity: 1;
}

/* BELOW CONTENT */
.main {
    padding: 60px 40px;
    text-align: center;
    background: #f8f8f8;
}

.logo {
    width: 260px;
    margin-bottom: 20px;
}

h1 {
    font-size: 42px;
    margin-bottom: 10px;
}

h2 {
    font-weight: 300;
    color: #555;
    margin-bottom: 20px;
}

/* FORM */
input {
    padding: 12px;
    width: 250px;
    border-radius: 5px;
    border: 1px solid #ccc;
}

button {
    padding: 12px 20px;
    background: #c8a97e;
    color: white;
    border: none;
    border-radius: 5px;
    margin-left: 10px;
    cursor: pointer;
}

button:hover {
    background: #a88c65;
}
</style>
</head>

<body>

<!-- ONLY IMAGE HERE -->
<div class="hero">
    <div class="slider">
        <img src="img1.jpg" class="slide active">
        <img src="img2.jpg" class="slide">
        <img src="img3.jpg" class="slide">
    </div>
</div>

<!-- EVERYTHING BELOW IMAGE -->
<div class="main">

    <img src="logo.png" class="logo">

    <h1>CEDAR CREST</h1>
    <h2>Luxury Homes Coming Soon in Mission, BC</h2>

    <form>
        <input type="email" placeholder="Enter your email" required>
        <button>Register Interest</button>
    </form>

    <p style="margin-top:20px;">
        📞 604-614-7771 <br>
        📧 info@pdcl.ca
    </p>

</div>

<!-- SLIDER SCRIPT -->
<script>
let slides = document.querySelectorAll(".slide");
let index = 0;

setInterval(() => {
    slides[index].classList.remove("active");
    index = (index + 1) % slides.length;
    slides[index].classList.add("active");
}, 4000);
</script>

</body>
</html>
