<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cedar Crest Homes</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: #d8cfb8;
}

/* ===== HERO / SLIDER ===== */
.hero {
    position: relative;
    width: 100%;
    height: 70vh;
    overflow: hidden;
}

/* Slides */
.slide {
    position: absolute;
    width: 100%;
    height: 100%;
    opacity: 0;
    animation: fade 18s infinite;
}

.slide img {
    width: 100%;
    height: 100%;
    object-fit: cover; /* 🔥 NO BLACK SIDES */
    animation: zoom 18s infinite;
}

/* Overlay (makes text readable) */
.overlay {
    position: absolute;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.35);
    z-index: 2;
}

/* Slide timing */
.slide:nth-child(1) { animation-delay: 0s; }
.slide:nth-child(2) { animation-delay: 6s; }
.slide:nth-child(3) { animation-delay: 12s; }

@keyframes fade {
    0% { opacity: 0; }
    5% { opacity: 1; }
    30% { opacity: 1; }
    35% { opacity: 0; }
    100% { opacity: 0; }
}

/* Subtle zoom (luxury effect) */
@keyframes zoom {
    0% { transform: scale(1); }
    100% { transform: scale(1.08); }
}

/* ===== CONTENT BELOW ===== */
.content {
    text-align: center;
    padding: 80px 20px 100px;
}

/* Logo */
.logo {
    width: 180px;
    margin-bottom: 25px;
}

/* Title */
h1 {
    font-size: 46px;
    letter-spacing: 6px;
    margin-bottom: 12px;
}

/* Subtitle */
h2 {
    font-weight: 300;
    color: #555;
    margin-bottom: 35px;
}

/* Form */
input {
    padding: 14px;
    width: 280px;
    border: none;
    border-radius: 6px;
}

button {
    padding: 14px 24px;
    border: none;
    background: #caa46b;
    color: white;
    border-radius: 6px;
    margin-left: 10px;
    cursor: pointer;
}

button:hover {
    background: #b8935c;
}

/* Contact */
.contact {
    margin-top: 25px;
    color: #444;
}
</style>
</head>

<body>

<!-- ===== HERO SECTION ===== -->
<div class="hero">

    <div class="overlay"></div>

    <div class="slide">
        <img src="img1.jpg">
    </div>

    <div class="slide">
        <img src="img2.jpg">
    </div>

    <div class="slide">
        <img src="img3.jpg">
    </div>

</div>

<!-- ===== CONTENT BELOW ===== -->
<div class="content">

    <img src="logo.png" class="logo">

    <h1>CEDAR CREST</h1>

    <h2>Luxury Homes Coming Soon in Mission, BC</h2>

    <div>
        <input type="email" placeholder="Enter your email">
        <button>Register Interest</button>
    </div>

    <div class="contact">
        📞 604-614-7771<br>
        ✉️ info@pdcl.ca
    </div>

</div>

</body>
</html>
