<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cedar Crest Homes</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background-color: #e9e2d0; /* beige */
}

/* ===== CAROUSEL ===== */
.carousel {
    width: 100%;
    height: 420px;
    overflow: hidden;
    position: relative;
    background: #000; /* fallback */
}

.slides {
    display: flex;
    width: 300%;
    height: 100%;
    animation: slide 12s infinite;
}

.slides img {
    width: 100%;
    height: 100%;
    object-fit: contain; /* 👈 shows FULL image */
    background: #000;
}

/* Slide animation */
@keyframes slide {
    0% {transform: translateX(0);}
    33% {transform: translateX(0);}
    38% {transform: translateX(-100%);}
    66% {transform: translateX(-100%);}
    71% {transform: translateX(-200%);}
    100% {transform: translateX(-200%);}
}

/* ===== CONTENT ===== */
.content {
    text-align: center;
    padding: 60px 20px;
}

/* LOGO BIGGER */
.logo {
    width: 180px;
    margin-bottom: 20px;
}

h1 {
    font-size: 42px;
    letter-spacing: 2px;
    margin-bottom: 10px;
}

h2 {
    font-weight: 300;
    color: #555;
    margin-bottom: 30px;
}

/* FORM */
.form-box {
    display: flex;
    justify-content: center;
    gap: 10px;
    flex-wrap: wrap;
}

input {
    padding: 12px;
    width: 260px;
    border-radius: 5px;
    border: 1px solid #ccc;
}

button {
    padding: 12px 18px;
    background: #c8a46b;
    border: none;
    color: white;
    border-radius: 5px;
    cursor: pointer;
}

/* CONTACT */
.contact {
    margin-top: 25px;
    color: #444;
    font-size: 14px;
}
</style>

</head>

<body>

<!-- ===== IMAGE CAROUSEL ===== -->
<div class="carousel">
    <div class="slides">
        <img src="Pic-1.jpeg.jpg">
        <img src="background.jpg">
        <img src="Pic-1.jpeg.jpg">
    </div>
</div>

<!-- ===== CONTENT BELOW ===== -->
<div class="content">

    <img src="logo.png" class="logo">

    <h1>CEDAR CREST</h1>
    <h2>Luxury Homes Coming Soon in Mission, BC</h2>

    <div class="form-box">
        <input type="email" placeholder="Enter your email">
        <button>Register Interest</button>
    </div>

    <div class="contact">
        📞 604-614-7771<br>
        ✉️ info@pdcl.ca
    </div>

</div>

</body>
</html>
