<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cedar Crest Homes</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background-color: #e9e2d0;
}

/* ===== IMAGE CAROUSEL ===== */
.carousel {
    width: 100%;
    height: 420px;
    background: black;
    overflow: hidden;
    position: relative;
}

.slide {
    position: absolute;
    width: 100%;
    height: 100%;
    opacity: 0;
    transition: opacity 1s ease-in-out;
}

.slide.active {
    opacity: 1;
}

.slide img {
    width: 100%;
    height: 100%;
    object-fit: contain; /* FULL IMAGE NO CUT */
}

/* ===== CONTENT BELOW ===== */
.content {
    text-align: center;
    padding: 70px 20px;
}

/* BIG LOGO */
.logo {
    width: 260px;
    margin-bottom: 25px;
}

h1 {
    font-size: 44px;
    margin-bottom: 10px;
}

h2 {
    font-weight: 300;
    color: #555;
    margin-bottom: 30px;
}

/* FORM */
.form-box {
    display: flex;
    justify-content: center;
    gap: 10px;
    flex-wrap: wrap;
}

input {
    padding: 12px;
    width: 260px;
    border-radius: 5px;
    border: 1px solid #ccc;
}

button {
    padding: 12px 18px;
    background: #c8a46b;
    border: none;
    color: white;
    border-radius: 5px;
    cursor: pointer;
}

.contact {
    margin-top: 25px;
    color: #444;
    font-size: 14px;
}
</style>

</head>

<body>

<!-- ===== CAROUSEL ===== -->
<div class="carousel">

    <div class="slide active">
        <img src="img1.jpg">
    </div>

    <div class="slide">
        <img src="img2.jpg">
    </div>

    <div class="slide">
        <img src="img3.jpg">
    </div>

</div>

<!-- ===== CONTENT ===== -->
<div class="content">

    <img src="logo.png" class="logo">

    <h1>CEDAR CREST</h1>
    <h2>Luxury Homes Coming Soon in Mission, BC</h2>

    <div class="form-box">
        <input type="email" placeholder="Enter your email">
        <button>Register Interest</button>
    </div>

    <div class="contact">
        📞 604-614-7771<br>
        ✉️ info@pdcl.ca
    </div>

</div>

<!-- ===== SCRIPT ===== -->
<script>
let slides = document.querySelectorAll('.slide');
let index = 0;

setInterval(() => {
    slides[index].classList.remove('active');
    index = (index + 1) % slides.length;
    slides[index].classList.add('active');
}, 4000);
</script>

</body>
</html>
