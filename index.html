<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cedar Crest Homes</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
}

/* HERO SECTION */
.hero {
    position: relative;
    height: 100vh;
    overflow: hidden;
}

/* SLIDER */
.slider {
    position: absolute;
    width: 100%;
    height: 100%;
}

.slide {
    position: absolute;
    width: 100%;
    height: 100%;
    object-fit: cover;
    opacity: 0;
    transition: opacity 1s ease-in-out;
}

.slide.active {
    opacity: 1;
}

/* DARK OVERLAY */
.hero::after {
    content: "";
    position: absolute;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.5);
}

/* CONTENT */
.hero-content {
    position: relative;
    z-index: 2;
    height: 100%;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    color: white;
    text-align: center;
    padding: 20px;
}

/* LOGO */
.logo {
    width: 320px;
    margin-bottom: 20px;
}

/* TEXT */
h1 {
    font-size: 52px;
    letter-spacing: 4px;
    margin-bottom: 10px;
}

h2 {
    font-weight: 300;
    margin-bottom: 25px;
    color: #ddd;
}

/* FORM */
input {
    padding: 12px;
    width: 260px;
    border-radius: 5px;
    border: none;
    margin-right: 10px;
}

button {
    padding: 12px 20px;
    background: #c8a97e;
    color: white;
    border: none;
    border-radius: 5px;
    cursor: pointer;
}

button:hover {
    background: #a88c65;
}

.contact {
    margin-top: 25px;
    font-size: 14px;
}
</style>
</head>

<body>

<div class="hero">

    <!-- IMAGE SLIDER -->
    <div class="slider">
        <img src="img1.jpg" class="slide active">
        <img src="img2.jpg" class="slide">
        <img src="img3.jpg" class="slide">
    </div>

    <!-- CONTENT -->
    <div class="hero-content">
        <img src="logo.png" class="logo">

        <h1>CEDAR CREST</h1>
        <h2>Luxury Homes Coming Soon in Mission, BC</h2>

        <!-- FORM -->
        <form action="https://formspree.io/f/YOUR-FORM-ID" method="POST">
            <input type="email" name="email" placeholder="Enter your email" required>
            <button type="submit">Register Interest</button>
        </form>

        <div class="contact">
            📞 604-614-7771 <br>
            📧 info@pdcl.ca
        </div>
    </div>

</div>

<!-- SLIDER SCRIPT -->
<script>
let slides = document.querySelectorAll(".slide");
let index = 0;

setInterval(() => {
    slides[index].classList.remove("active");
    index = (index + 1) % slides.length;
    slides[index].classList.add("active");
}, 4000);
</script>

</body>
</html>
