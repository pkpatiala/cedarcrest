<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cedar Crest Homes</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
}

/* HERO (TOP IMAGE SECTION) */
.hero {
    position: relative;
    height: 65vh;
    overflow: hidden;
}

/* SLIDER */
.slider {
    position: absolute;
    width: 100%;
    height: 100%;
}

.slide {
    position: absolute;
    width: 100%;
    height: 100%;
    object-fit: cover;
    opacity: 0;
    transition: opacity 1s ease-in-out;
}

.slide.active {
    opacity: 1;
}

/* DARK OVERLAY */
.hero::after {
    content: "";
    position: absolute;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.45);
}

/* HERO CONTENT */
.hero-content {
    position: relative;
    z-index: 2;
    height: 100%;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    color: white;
    text-align: center;
    padding: 20px;
}

/* LOGO */
.logo {
    width: 260px;
    margin-bottom: 15px;
}

/* TEXT */
h1 {
    font-size: 48px;
    letter-spacing: 3px;
    margin-bottom: 10px;
}

h2 {
    font-weight: 300;
    margin-bottom: 20px;
    color: #ddd;
}

/* FORM */
input {
    padding: 12px;
    width: 240px;
    border-radius: 5px;
    border: none;
    margin-right: 10px;
}

button {
    padding: 12px 20px;
    background: #c8a97e;
    color: white;
    border: none;
    border-radius: 5px;
    cursor: pointer;
}

button:hover {
    background: #a88c65;
}

/* BELOW SECTIONS */
.section {
    padding: 80px 20px;
    text-align: center;
    background: white;
}

.section.light {
    background: #f5f5f5;
}

.section h2 {
    font-size: 32px;
    margin-bottom: 15px;
}

.section p {
    font-size: 18px;
    color: #555;
}
</style>
</head>

<body>

<!-- HERO SECTION -->
<div class="hero">

    <div class="slider">
        <img src="img1.jpg" class="slide active">
        <img src="img2.jpg" class="slide">
        <img src="img3.jpg" class="slide">
    </div>

    <div class="hero-content">
        <img src="logo.png" class="logo">

        <h1>CEDAR CREST</h1>
        <h2>Luxury Homes Coming Soon in Mission, BC</h2>

        <form>
            <input type="email" placeholder="Enter your email" required>
            <button>Register Interest</button>
        </form>
    </div>

</div>

<!-- SECTION 1 -->
<div class="section">
    <h2>About Cedar Crest</h2>
    <p>Modern townhomes in Mission, BC with rooftop decks and premium finishes.</p>
</div>

<!-- SECTION 2 -->
<div class="section light">
    <h2>Project Highlights</h2>
    <p>
        Rooftop patios<br>
        Modern architecture<br>
        Prime Mission location
    </p>
</div>

<!-- SECTION 3 -->
<div class="section">
    <h2>Contact</h2>
    <p>
        📞 604-614-7771<br>
        📧 info@pdcl.ca
    </p>
</div>

<!-- SLIDER SCRIPT -->
<script>
let slides = document.querySelectorAll(".slide");
let index = 0;

setInterval(() => {
    slides[index].classList.remove("active");
    index = (index + 1) % slides.length;
    slides[index].classList.add("active");
}, 4000);
</script>

</body>
</html>
