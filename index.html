<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cedar Crest Homes</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: #d8cfb8;
}

/* ===== CAROUSEL ===== */
.carousel {
    width: 100%;
    height: 520px; /* increased height */
    background: #000;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
}

.slides {
    width: 100%;
    height: 100%;
    position: relative;
}

.slide {
    position: absolute;
    width: 100%;
    height: 100%;
    opacity: 0;
    animation: fade 15s infinite;
}

.slide img {
    width: 100%;
    height: 100%;
    object-fit: contain; /* 🔥 SHOW FULL IMAGE */
    background: black;
}

/* Fade animation */
.slide:nth-child(1) { animation-delay: 0s; }
.slide:nth-child(2) { animation-delay: 5s; }
.slide:nth-child(3) { animation-delay: 10s; }

@keyframes fade {
    0% { opacity: 0; }
    5% { opacity: 1; }
    30% { opacity: 1; }
    35% { opacity: 0; }
    100% { opacity: 0; }
}

/* ===== CONTENT ===== */
.content {
    text-align: center;
    padding: 70px 20px 90px;
}

/* 🔥 BIGGER LOGO */
.logo {
    width: 200px;
    margin-bottom: 25px;
}

h1 {
    font-size: 44px;
    letter-spacing: 5px;
    margin-bottom: 10px;
}

h2 {
    font-weight: 300;
    color: #555;
    margin-bottom: 35px;
}

form {
    margin-bottom: 20px;
}

input {
    padding: 14px;
    width: 280px;
    border: none;
    border-radius: 5px;
}

button {
    padding: 14px 22px;
    border: none;
    background: #caa46b;
    color: white;
    border-radius: 5px;
    margin-left: 10px;
    cursor: pointer;
}

button:hover {
    background: #b8935c;
}

.contact {
    margin-top: 25px;
    color: #444;
}
</style>
</head>

<body>

<!-- ===== IMAGE CAROUSEL ===== -->
<div class="carousel">
    <div class="slides">

        <div class="slide">
            <img src="img1.jpg">
        </div>

        <div class="slide">
            <img src="img2.jpg">
        </div>

        <div class="slide">
            <img src="img3.jpg">
        </div>

    </div>
</div>

<!-- ===== BELOW SECTION ===== -->
<div class="content">

    <img src="logo.png" class="logo">

    <h1>CEDAR CREST</h1>

    <h2>Luxury Homes Coming Soon in Mission, BC</h2>

    <form>
        <input type="email" placeholder="Enter your email">
        <button>Register Interest</button>
    </form>

    <div class="contact">
        📞 604-614-7771<br>
        ✉️ info@pdcl.ca
    </div>

</div>

</body>
</html>
