<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cedar Crest Homes</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: #d8cfb8;
}

/* ===== CAROUSEL ===== */
.carousel {
    width: 100%;
    height: 420px;
    position: relative;
    overflow: hidden;
    background: #000;
}

.slides {
    display: flex;
    width: 300%;
    height: 100%;
    animation: slide 15s infinite;
}

.slide {
    width: 100%;
    height: 100%;
    flex-shrink: 0;
}

/* 🔥 KEY FIX HERE */
.slide img {
    width: 100%;
    height: 100%;
    object-fit: cover;   /* fills full width */
}

/* Animation */
@keyframes slide {
    0% { transform: translateX(0); }
    30% { transform: translateX(0); }
    33% { transform: translateX(-100%); }
    63% { transform: translateX(-100%); }
    66% { transform: translateX(-200%); }
    96% { transform: translateX(-200%); }
    100% { transform: translateX(0); }
}

/* ===== CONTENT SECTION ===== */
.content {
    text-align: center;
    padding: 60px 20px 80px;
}

/* Bigger logo */
.logo {
    width: 130px;
    margin-bottom: 20px;
}

h1 {
    font-size: 42px;
    letter-spacing: 4px;
    margin-bottom: 10px;
}

h2 {
    font-weight: 300;
    color: #555;
    margin-bottom: 30px;
}

form {
    margin-bottom: 20px;
}

input {
    padding: 12px;
    width: 260px;
    border: none;
    border-radius: 5px;
}

button {
    padding: 12px 20px;
    border: none;
    background: #caa46b;
    color: white;
    border-radius: 5px;
    margin-left: 10px;
    cursor: pointer;
}

button:hover {
    background: #b8935c;
}

.contact {
    margin-top: 20px;
    color: #444;
}
</style>
</head>

<body>

<!-- ===== IMAGE CAROUSEL ===== -->
<div class="carousel">
    <div class="slides">
        <div class="slide">
            <img src="img1.jpg">
        </div>
        <div class="slide">
            <img src="img2.jpg">
        </div>
        <div class="slide">
            <img src="img3.jpg">
        </div>
    </div>
</div>

<!-- ===== CONTENT BELOW ===== -->
<div class="content">

    <img src="logo.png" class="logo">

    <h1>CEDAR CREST</h1>
    <h2>Luxury Homes Coming Soon in Mission, BC</h2>

    <form>
        <input type="email" placeholder="Enter your email">
        <button>Register Interest</button>
    </form>

    <div class="contact">
        📞 604-614-7771<br>
        ✉️ info@pdcl.ca
    </div>

</div>

</body>
</html>
